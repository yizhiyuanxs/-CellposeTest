project:
  name: attention-cell-seg
  stage: A
  seed: 42

dataset:
  root: data/sample_dataset
  splits:
    - train
    - val
    - test
  image_dir_name: images
  mask_dir_name: masks
  image_extensions:
    - .png
    - .jpg
    - .jpeg
    - .tif
    - .tiff
    - .bmp
  mask_extensions:
    - .png
    - .tif
    - .tiff
    - .bmp

runtime:
  output_root: runs/stage_a
  allow_empty_dataset: true
  write_summary: true

experiment:
  name: stage_a_minimal_bootstrap
  mode: bootstrap
