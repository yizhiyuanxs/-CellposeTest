project:
  name: attention-cell-seg
  stage: formal
  seed: 42

dataset:
  root: data/formal_dataset/processed
  splits:
    - train
    - val
    - test
  image_dir_name: images
  mask_dir_name: masks
  image_extensions:
    - .png
    - .jpg
    - .jpeg
    - .tif
    - .tiff
    - .bmp
  mask_extensions:
    - .png
    - .tif
    - .tiff
    - .bmp
  input_channels: 1

runtime:
  output_root: runs/formal
  num_workers: 0

experiment:
  name: formal_baseline_unet
  mode: baseline

training:
  epochs: 50
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.0
  device: cpu
  amp: false

model:
  name: unet
  in_channels: 1
  out_channels: 1
  base_channels: 16
  attention: baseline
  attention_reduction: 8

inference:
  threshold: 0.5
