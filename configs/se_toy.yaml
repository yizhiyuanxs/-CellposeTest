project:
  name: attention-cell-seg
  stage: C
  seed: 42

dataset:
  root: data/toy_cells
  splits:
    - train
    - val
    - test
  image_dir_name: images
  mask_dir_name: masks
  image_extensions:
    - .png
  mask_extensions:
    - .png
  input_channels: 1

runtime:
  output_root: runs/stage_c
  num_workers: 0

experiment:
  name: se_toy_unet
  mode: se

training:
  epochs: 2
  batch_size: 4
  learning_rate: 0.001
  weight_decay: 0.0
  device: cpu
  amp: false

model:
  name: unet
  in_channels: 1
  out_channels: 1
  base_channels: 16
  attention: se
  attention_reduction: 8

inference:
  threshold: 0.5
